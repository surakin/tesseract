<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Soft shadow for the lifting effect -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <!-- Subtle gradient for the paper texture/lighting -->
    <linearGradient id="note-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7A1" />
      <stop offset="100%" stop-color="#FFF176" />
    </linearGradient>
  </defs>

  <!-- The Sticky Note Path (with a slightly curled bottom-right corner) -->
  <path d="M 15 15 
           L 85 15 
           L 85 75 
           Q 83 83, 75 84 
           L 15 85 
           Z" 
        fill="url(#note-grad)" 
        filter="url(#drop-shadow)" />

  <!-- The Peeled Corner Shadow/Fold Effect -->
  <path d="M 85 75 Q 83 83, 75 84 Q 81 79, 85 75" fill="#E0D668" opacity="0.7" />
  
  <!-- Adhesive strip at the top (subtle texture difference) -->
  <rect x="15" y="15" width="70" height="12" fill="#FFFFFF" opacity="0.15" />
</svg>
