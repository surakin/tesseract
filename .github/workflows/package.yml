name: Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows — NSIS installer (.exe)
  # ---------------------------------------------------------------------------
  windows:
    name: Windows (NSIS)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk -> ../build/windows-release

      - name: Install resvg-py (icon generation)
        run: pip install resvg-py

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      # opus is required by matrix-sdk-ui (MSC3245 voice messages).
      # Build from source so the CRT (/MD) and generator (Ninja+MSVC) match
      # the rest of the project exactly — avoids vcpkg triplet and GITHUB_ENV
      # encoding issues.
      - name: Build opus from source
        run: |
          git clone --depth 1 --branch v1.5.2 https://github.com/xiph/opus.git opus-src
          cmake -S opus-src -B opus-build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL `
            -DOPUS_BUILD_SHARED_LIBRARY=OFF `
            -DOPUS_BUILD_PROGRAMS=OFF `
            -DOPUS_BUILD_TESTING=OFF
          cmake --build opus-build
          $lib = (Resolve-Path opus-build).Path
          $inc = (Resolve-Path opus-src/include).Path
          "OPUS_LIB_DIR=$lib" >> $env:GITHUB_ENV
          "OPUS_INCLUDE_DIR=$inc" >> $env:GITHUB_ENV
          "OPUS_STATIC=1" >> $env:GITHUB_ENV

      # cmake, ninja, Go, and Strawberry Perl are pre-installed on
      # windows-latest; Go and Perl satisfy the aws-lc-sys CMake builder.
      - name: Configure (Release)
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build build/windows-release

      - name: Package (CPack → NSIS)
        run: cmake --build build/windows-release --target package

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-windows
          path: build/windows-release/Tesseract-*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) — DragNDrop DMG
  # ---------------------------------------------------------------------------
  macos-arm64:
    name: macOS arm64 (DMG)
    runs-on: macos-latest   # macos-15, Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install go librsvg autoconf automake libtool opus

      - name: Expose opus to audiopus_sys
        run: |
          echo "OPUS_LIB_DIR=$(brew --prefix opus)/lib" >> $GITHUB_ENV
          echo "OPUS_INCLUDE_DIR=$(brew --prefix opus)/include" >> $GITHUB_ENV
          echo "OPUS_STATIC=1" >> $GITHUB_ENV

      - name: Install Rust (stable, aarch64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk -> ../build/macos-appkit-arm64-release

      - name: Configure (Release, arm64)
        run: cmake --preset macos-appkit-arm64-release

      - name: Build
        run: cmake --build build/macos-appkit-arm64-release

      - name: Package (CPack → DMG)
        run: cmake --build build/macos-appkit-arm64-release --target package

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-macos-arm64
          path: build/macos-appkit-arm64-release/Tesseract-*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS x86_64 (Intel) — DragNDrop DMG
  # ---------------------------------------------------------------------------
  macos-x86_64:
    name: macOS x86_64 (DMG)
    runs-on: macos-13       # last Intel runner offered by GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install go librsvg autoconf automake libtool opus

      - name: Expose opus to audiopus_sys
        run: |
          echo "OPUS_LIB_DIR=$(brew --prefix opus)/lib" >> $GITHUB_ENV
          echo "OPUS_INCLUDE_DIR=$(brew --prefix opus)/include" >> $GITHUB_ENV
          echo "OPUS_STATIC=1" >> $GITHUB_ENV

      - name: Install Rust (stable, x86_64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk -> ../build/macos-appkit-x86_64-release

      - name: Configure (Release, x86_64)
        run: cmake --preset macos-appkit-x86_64-release

      - name: Build
        run: cmake --build build/macos-appkit-x86_64-release

      - name: Package (CPack → DMG)
        run: cmake --build build/macos-appkit-x86_64-release --target package

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-macos-x86_64
          path: build/macos-appkit-x86_64-release/Tesseract-*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux x86_64 — DEB + RPM (Qt6 backend, CPack)
  #
  # rpm-build is required by CPack's RPM generator even when running on
  # a Debian-based runner.
  # ---------------------------------------------------------------------------
  linux-packages:
    name: Linux x86_64 (DEB + RPM)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            qt6-base-dev qt6-base-private-dev qt6-multimedia-dev \
            ninja-build \
            libgl-dev \
            libopus-dev \
            golang perl \
            libwayland-dev \
            rpm

      - name: Expose opus to audiopus_sys
        run: |
          echo "OPUS_LIB_DIR=$(pkg-config --variable=libdir opus)" >> $GITHUB_ENV
          echo "OPUS_INCLUDE_DIR=$(pkg-config --variable=includedir opus)" >> $GITHUB_ENV
          echo "OPUS_STATIC=1" >> $GITHUB_ENV

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk -> ../build/linux-qt6-release

      - name: Configure (Release)
        run: cmake --preset linux-qt6-release

      - name: Build
        run: cmake --build build/linux-qt6-release

      - name: Package (CPack → DEB + RPM)
        run: cmake --build build/linux-qt6-release --target package

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-linux-deb
          path: build/linux-qt6-release/*.deb
          if-no-files-found: error

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-linux-rpm
          path: build/linux-qt6-release/*.rpm
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux x86_64 — AppImage (Qt6 backend)
  #
  # Built on ubuntu-22.04 (glibc 2.35) for maximum AppImage compatibility.
  # cmake and ninja are pre-installed on GitHub's ubuntu-22.04 runner.
  # linuxdeploy and its Qt plugin are downloaded at runtime; they are run
  # in extract-and-run mode because FUSE is unavailable in CI containers.
  # ---------------------------------------------------------------------------
  linux-appimage:
    name: Linux x86_64 (AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            qt6-base-dev qt6-base-private-dev qt6-multimedia-dev \
            ninja-build \
            libgl-dev \
            libopus-dev \
            golang perl \
            libwayland-dev

      - name: Expose opus to audiopus_sys
        run: |
          echo "OPUS_LIB_DIR=$(pkg-config --variable=libdir opus)" >> $GITHUB_ENV
          echo "OPUS_INCLUDE_DIR=$(pkg-config --variable=includedir opus)" >> $GITHUB_ENV
          echo "OPUS_STATIC=1" >> $GITHUB_ENV

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk -> ../build/linux-qt6-release

      - name: Configure (Release)
        run: cmake --preset linux-qt6-release

      - name: Build
        run: cmake --build build/linux-qt6-release

      - name: Install into AppDir
        run: cmake --install build/linux-qt6-release --prefix AppDir/usr

      - name: Download linuxdeploy and Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-linux-appimage
          path: Tesseract-*.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # GitHub Release — attach all four artifacts when a version tag is pushed
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos-arm64, macos-x86_64, linux-appimage, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tesseract-windows/Tesseract-*.exe
            dist/tesseract-macos-arm64/Tesseract-*.dmg
            dist/tesseract-macos-x86_64/Tesseract-*.dmg
            dist/tesseract-linux-appimage/Tesseract-*.AppImage
            dist/tesseract-linux-deb/*.deb
            dist/tesseract-linux-rpm/*.rpm
          generate_release_notes: true
