[package]
name    = "tesseract-sdk-ffi"
version = "0.1.0"
edition = "2021"

[lib]
name      = "tesseract_sdk_ffi"
crate-type = ["staticlib", "cdylib"]

[dependencies]
cxx        = "1.0"
tokio      = { version = "1", features = ["full"] }
matrix-sdk    = { version = "0.16.1", features = ["e2e-encryption", "sqlite"] }
matrix-sdk-ui = { version = "0.16.1" }
futures-util = "0.3"
anyhow     = "1"
tracing    = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url        = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http     = "0.12"